<div class="min-h-screen bg-gray-100 py-8">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">My Profile</h1>
      <p class="text-gray-600 mt-2">Manage your personal information</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Sidebar -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl shadow-md p-6 text-center">
          <!-- Avatar -->
          <div class="relative inline-block">
            <div class="w-32 h-32 mx-auto rounded-full bg-gradient-to-r from-blue-500 to-indigo-600 flex items-center justify-center text-white text-4xl font-bold overflow-hidden">
              <img *ngIf="currentUser?.avatar" [src]="currentUser?.avatar" alt="Avatar" class="w-full h-full object-cover">
              <span *ngIf="!currentUser?.avatar && currentUser">{{ getInitials(currentUser.name) }}</span>
              <span *ngIf="!currentUser"><i class="fas fa-user text-5xl"></i></span>
            </div>
            
            <button (click)="fileInput.click()" class="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700 transition-colors">
              <i class="fas fa-camera"></i>
            </button>
            <input #fileInput type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">
          </div>

          <div *ngIf="selectedFile" class="mt-4">
            <button (click)="uploadAvatar()" [disabled]="isLoading" class="w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
              {{ isLoading ? 'Uploading...' : 'Upload Avatar' }}
            </button>
          </div>

          <h2 class="mt-4 text-xl font-semibold text-gray-900">{{ currentUser?.name }}</h2>
          <p class="text-gray-600">{{ currentUser?.email }}</p>
          <p class="text-sm text-gray-500 mt-2 capitalize">
            <i class="fas fa-briefcase mr-1"></i> {{ currentUser?.role }}
          </p>
        </div>
      </div>

      <!-- Main Content -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Profile Information -->
        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold text-gray-900">Profile Information</h2>
            <button (click)="toggleEdit()" class="text-blue-600 hover:text-blue-700">
              <i [class]="isEditing ? 'fas fa-times' : 'fas fa-edit'"></i>
              {{ isEditing ? 'Cancel' : 'Edit' }}
            </button>
          </div>

          <form [formGroup]="profileForm" (ngSubmit)="updateProfile()">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                <input type="text" formControlName="name" [disabled]="!isEditing" 
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                <input type="email" formControlName="email" [disabled]="!isEditing"
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                <input type="tel" formControlName="phone" [disabled]="!isEditing"
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                <textarea formControlName="address" rows="2" [disabled]="!isEditing"
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100"></textarea>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">City</label>
                  <input type="text" formControlName="city" [disabled]="!isEditing"
                    class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">State</label>
                  <input type="text" formControlName="state" [disabled]="!isEditing"
                    class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100">
                </div>
              </div>

              <div *ngIf="isEditing" class="pt-4">
                <button type="submit" [disabled]="isLoading" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                  {{ isLoading ? 'Saving...' : 'Save Changes' }}
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- Change Password -->
        <div class="bg-white rounded-xl shadow-md p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold text-gray-900">Change Password</h2>
            <button (click)="togglePasswordChange()" class="text-blue-600 hover:text-blue-700">
              <i [class]="isChangingPassword ? 'fas fa-times' : 'fas fa-key'"></i>
              {{ isChangingPassword ? 'Cancel' : 'Change Password' }}
            </button>
          </div>

          <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" *ngIf="isChangingPassword">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Current Password *</label>
                <input type="password" formControlName="currentPassword"
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">New Password *</label>
                <input type="password" formControlName="newPassword"
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password *</label>
                <input type="password" formControlName="confirmPassword"
                  class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                <div *ngIf="passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched" 
                  class="text-red-500 text-xs mt-1">
                  Passwords do not match
                </div>
              </div>

              <button type="submit" [disabled]="isLoading" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                {{ isLoading ? 'Changing...' : 'Change Password' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
