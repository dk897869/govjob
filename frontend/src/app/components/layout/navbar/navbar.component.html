<nav class="bg-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <a routerLink="/dashboard" class="flex items-center space-x-2">
          <div class="h-8 w-8 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center">
            <i class="fas fa-briefcase text-white text-sm"></i>
          </div>
          <span class="font-bold text-xl text-gray-800">GovJob</span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-4">
        <a routerLink="/dashboard" routerLinkActive="active" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition-colors">
          Dashboard
        </a>
        <a routerLink="/jobs" routerLinkActive="active" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition-colors">
          Find Jobs
        </a>
        <a routerLink="/my-applications" routerLinkActive="active" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition-colors">
          My Applications
        </a>
        <a routerLink="/skill-tests" routerLinkActive="active" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition-colors">
          Skill Tests
        </a>
        <a routerLink="/chat" routerLinkActive="active" class="px-3 py-2 rounded-md text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50 transition-colors">
          Messages
        </a>
      </div>

      <!-- Right side -->
      <div class="flex items-center space-x-4">
        <!-- Notifications -->
        <button class="relative p-2 rounded-full hover:bg-gray-100 transition-colors">
          <i class="fas fa-bell text-gray-600"></i>
          <span *ngIf="notificationCount > 0" class="absolute top-0 right-0 h-4 w-4 bg-red-500 rounded-full text-xs text-white flex items-center justify-center">
            {{ notificationCount }}
          </span>
        </button>

        <!-- User Menu -->
        <div class="relative">
          <button (click)="toggleMenu()" class="flex items-center space-x-2 p-2 rounded-full hover:bg-gray-100 transition-colors">
            <img [src]="currentUser?.avatar || 'https://ui-avatars.com/api/?name=' + currentUser?.name + '&background=3B82F6&color=fff'" 
                 class="h-8 w-8 rounded-full">
            <span class="text-sm font-medium text-gray-700 hidden lg:block">{{ currentUser?.name }}</span>
            <i class="fas fa-chevron-down text-gray-500 text-xs"></i>
          </button>

          <!-- Dropdown Menu -->
          <div *ngIf="isMenuOpen" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-10 animate-fade-in">
            <a routerLink="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-user mr-2"></i> My Profile
            </a>
            <a routerLink="/profile/edit" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-edit mr-2"></i> Edit Profile
            </a>
            <a routerLink="/saved-jobs" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fas fa-heart mr-2"></i> Saved Jobs
            </a>
            <div class="border-t my-1"></div>
            <button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
              <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
          </div>
        </div>

        <!-- Mobile menu button -->
        <button (click)="toggleMenu()" class="md:hidden p-2 rounded-md hover:bg-gray-100">
          <i class="fas fa-bars text-gray-600"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Navigation -->
  <div *ngIf="isMenuOpen" class="md:hidden bg-white border-t">
    <div class="px-2 pt-2 pb-3 space-y-1">
      <a routerLink="/dashboard" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
        Dashboard
      </a>
      <a routerLink="/jobs" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
        Find Jobs
      </a>
      <a routerLink="/my-applications" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
        My Applications
      </a>
      <a routerLink="/skill-tests" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
        Skill Tests
      </a>
      <a routerLink="/chat" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-blue-600 hover:bg-gray-50">
        Messages
      </a>
    </div>
  </div>
</nav>
